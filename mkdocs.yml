site_name: Nexapp SD-WAN Documentation
site_description: User Manuals for NexappOS Firmware & Nexapp SDWAN Orchestrator/Controller
site_author: Nexapp Technologies

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - navigation.prune
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - toc.follow
  logo: assets/images/nexapp-logo-white.png
  favicon: assets/images/favicon.ico
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/pdf-download.js

plugins:
  - search
  - with-pdf:
      author: Nexapp Technologies
      copyright: Copyright &copy; 2026 Nexapp Technologies Pvt. Ltd.
      cover_title: Nexapp SDWAN Playbook
      cover_subtitle: NexappOS Firmware & SDWAN Controller — Complete Reference
      toc_title: Table of Contents
      toc_level: 3
      output_path: pdf/Nexapp-SDWAN-Playbook.pdf

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

